spring.application.name=assignment1

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret key (must be at least 256 bits / 32 characters)
jwt.secret=mysecretkeymysecretkeymysecretkey1234567890abcd
jwt.expiration=86400000